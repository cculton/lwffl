<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Champions – LWFFL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    .shell { max-width: 1000px; margin: 24px auto; }

    .container {
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), transparent 55%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.18), transparent 55%),
        var(--card-bg);
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(15, 23, 42, 0.9);
      padding: 32px 24px;
      backdrop-filter: blur(14px);
    }

    .header { text-align: center; margin-bottom: 28px; }
    .header h1 {
      font-size: 2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 6px;
      color: #f9fafb;
    }
    .header p {
      color: var(--text-soft);
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }
    .summary-card {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .summary-label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .summary-value {
      font-size: 1.3rem;
      font-weight: 800;
      color: #f9fafb;
    }
    .summary-sub {
      font-size: 0.75rem;
      color: var(--text-soft);
      margin-top: 2px;
    }

    .timeline { display: flex; flex-direction: column; gap: 16px; }

    .season-card {
      background: radial-gradient(circle at top left, rgba(15, 23, 42, 0.97), rgba(15, 23, 42, 0.99));
      border: 1px solid rgba(31, 41, 55, 0.95);
      border-radius: 14px;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 20px;
      align-items: start;
      transition: border-color 0.2s;
    }
    .season-card:hover {
      border-color: rgba(56, 189, 248, 0.3);
    }
    .season-card.latest {
      border-color: rgba(56, 189, 248, 0.4);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.08), transparent 60%),
        radial-gradient(circle at top left, rgba(15, 23, 42, 0.97), rgba(15, 23, 42, 0.99));
    }

    .season-year {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      padding-top: 2px;
    }

    .season-body { min-width: 0; }

    .season-champ {
      font-size: 1.2rem;
      font-weight: 700;
      color: #f9fafb;
      margin-bottom: 6px;
    }

    .season-score {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .season-score strong { color: var(--text-main); font-weight: 600; }

    .season-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 8px;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
    }
    .detail-label {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-soft);
    }
    .detail-value {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-soft);
    }

    @media (max-width: 600px) {
      .container { padding: 22px 14px; }
      .header h1 { font-size: 1.5rem; }
      .season-card {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .season-year { font-size: 1.4rem; }
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  <div class="shell">
    <div class="container">
      <header class="header">
        <h1>Champions</h1>
        <p>Every LWFFL season from newest to oldest</p>
      </header>

      <div id="summaryGrid" class="summary-grid"></div>
      <div id="timeline" class="timeline">
        <div class="loading">Loading season history...</div>
      </div>
    </div>
  </div>

<script>
  async function loadChampions() {
    const [standingsRes, scoresRes] = await Promise.all([
      fetch('final-standings.json'),
      fetch('league-scores.json')
    ]);
    if (!standingsRes.ok || !scoresRes.ok) {
      document.getElementById('timeline').innerHTML = '<div class="loading">Error loading data.</div>';
      return;
    }

    const standings = await standingsRes.json();
    const scores = await scoresRes.json();

    const champGames = {};
    scores.forEach(m => {
      if (m.playoffs === 'Championship') {
        champGames[m.year] = m;
      }
    });

    const years = [...new Set(standings.map(r => r.year))].sort((a, b) => b - a);
    const seasons = [];

    const champCounts = {};
    const scoringCounts = {};

    years.forEach(year => {
      const roster = standings.filter(r => r.year === year);
      roster.sort((a, b) => (a.final_standing ?? 99) - (b.final_standing ?? 99));

      const champ = roster[0];
      const runnerUp = roster[1];
      const lastPlace = roster[roster.length - 1];
      const scoringLeader = roster.slice().sort((a, b) => (b.points_for ?? 0) - (a.points_for ?? 0))[0];

      champCounts[champ.manager] = (champCounts[champ.manager] || 0) + 1;
      scoringCounts[scoringLeader.manager] = (scoringCounts[scoringLeader.manager] || 0) + 1;

      const game = champGames[year];
      let champScore = null;
      if (game) {
        const s1 = Number(game.score1);
        const s2 = Number(game.score2);
        if (game.manager1 === champ.manager) {
          champScore = { winner: s1, loser: s2 };
        } else {
          champScore = { winner: s2, loser: s1 };
        }
      }

      seasons.push({ year, champ, runnerUp, lastPlace, scoringLeader, champScore, teamCount: roster.length });
    });

    const mostChamps = Object.entries(champCounts).sort((a, b) => b[1] - a[1])[0];
    const mostScoring = Object.entries(scoringCounts).sort((a, b) => b[1] - a[1])[0];
    const uniqueChamps = Object.keys(champCounts).length;

    const summaryEl = document.getElementById('summaryGrid');
    summaryEl.innerHTML = `
      <div class="summary-card">
        <div class="summary-label">Seasons</div>
        <div class="summary-value">${years.length}</div>
        <div class="summary-sub">${years[years.length - 1]}–${years[0]}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Unique Champions</div>
        <div class="summary-value">${uniqueChamps}</div>
        <div class="summary-sub">of 16 all-time managers</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Most Titles</div>
        <div class="summary-value">${mostChamps[0]}</div>
        <div class="summary-sub">${mostChamps[1]} championship${mostChamps[1] > 1 ? 's' : ''}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Most Scoring Titles</div>
        <div class="summary-value">${mostScoring[0]}</div>
        <div class="summary-sub">${mostScoring[1]} title${mostScoring[1] > 1 ? 's' : ''}</div>
      </div>
    `;

    const timelineEl = document.getElementById('timeline');
    timelineEl.innerHTML = seasons.map((s, i) => {
      const scoreStr = s.champScore
        ? `<strong>${s.champScore.winner.toFixed(2)}</strong> – ${s.champScore.loser.toFixed(2)}`
        : '';

      return `
        <div class="season-card${i === 0 ? ' latest' : ''}">
          <div class="season-year">${s.year}</div>
          <div class="season-body">
            <div class="season-champ">\u{1F3C6} ${s.champ.manager}</div>
            <div class="season-score">
              Championship: ${scoreStr} vs ${s.runnerUp.manager}
              &nbsp;·&nbsp; Record: ${s.champ.wins}-${s.champ.losses}${s.champ.ties ? '-' + s.champ.ties : ''}
            </div>
            <div class="season-details">
              <div class="detail-item">
                <span class="detail-label">Runner-Up</span>
                <span class="detail-value">${s.runnerUp.manager}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">Scoring Title</span>
                <span class="detail-value">${s.scoringLeader.manager} (${Number(s.scoringLeader.points_for).toLocaleString()} pts)</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">Last Place</span>
                <span class="detail-value">${s.lastPlace.manager}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">Teams</span>
                <span class="detail-value">${s.teamCount}</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  document.addEventListener('DOMContentLoaded', loadChampions);
</script>
<script src="nav-loader.js" defer></script>
</body>
</html>
